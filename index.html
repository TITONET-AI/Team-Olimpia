<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Team Olimpia — Ranking</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f6f9; color: #1a1a2e; min-height: 100vh; }
    #root { max-width: 640px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
    input, select, button { font-family: inherit; font-size: 14px; }
    input[type=text], input[type=date], select {
      width: 100%; padding: 9px 12px; border: 1px solid #dde3ed; border-radius: 8px;
      background: #fff; color: #1a1a2e; outline: none; transition: border-color 0.15s;
    }
    input:focus, select:focus { border-color: #1B75BB; box-shadow: 0 0 0 3px rgba(27,117,187,0.1); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
